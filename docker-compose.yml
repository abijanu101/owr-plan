services:
  mongo:
    image: mongo:7
    container_name: mongo
    volumes:
      - ./mongo_data:/data/db
    restart: unless-stopped
    networks:
      - app_net

  backend:
    build: ./backend
    container_name: backend
    environment:
      - PORT=5000
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/owrplan
    expose:
      - "5000"
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - app_net
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    image: node:22
    working_dir: /app
    container_name: frontend
    environment:
      - VITE_API_URL=http://backend:5000
    ports:
      - "3000:3000"
    networks:
      - app_net
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"

networks:
  app_net:
